name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  build-macos:
    runs-on: macos-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: build/src/uZXTests_artefacts/Release/uZXTests

  build-linux:
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libglib2.0-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build tests
        run: cmake --build build --target uZXTests

      - name: Run tests
        run: build/src/uZXTests_artefacts/Release/uZXTests

  build-windows:
    runs-on: windows-latest
    if: github.ref_type == 'branch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build tests
        run: cmake --build build --config Release --target uZXTests

      - name: Run tests
        run: build\src\uZXTests_artefacts\Release\uZXTests.exe

  create-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  release-macos:
    runs-on: macos-latest
    needs: create-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target uZX --target uZXPlayer

      - name: Upload to GitHub Release
        run: |
          gh release upload ${{ github.ref_name }} \
            build/src/uZX_artefacts/Release/*.app \
            build/src/uZXPlayer_artefacts/Release/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux:
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libfreetype-dev libfontconfig1-dev \
            libgl1-mesa-dev libglu1-mesa-dev \
            libglib2.0-dev \
            libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --target uZX --target uZXPlayer

      - name: Upload to GitHub Release
        run: |
          find build/src/uZX_artefacts/Release \
               build/src/uZXPlayer_artefacts/Release \
               -maxdepth 1 -type f -executable \
          | xargs gh release upload ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-windows:
    runs-on: windows-latest
    needs: create-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --target uZX --target uZXPlayer

      - name: Upload to GitHub Release
        run: |
          Get-ChildItem "build\src\uZX_artefacts\Release\*.exe","build\src\uZXPlayer_artefacts\Release\*.exe" |
            ForEach-Object { gh release upload "${{ github.ref_name }}" $_.FullName }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
