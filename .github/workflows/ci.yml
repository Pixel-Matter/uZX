name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: build/src/uZXTests_artefacts/Release/uZXTests

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build tests
        run: cmake --build build --config Release --target uZXTests

      - name: Run tests
        run: build\src\uZXTests_artefacts\Release\uZXTests.exe

  release-windows:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --target uZX --target uZXPlayer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uZX-windows-${{ github.ref_name }}
          path: |
            build/src/uZX_artefacts/Release/
            build/src/uZXPlayer_artefacts/Release/
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/src/uZX_artefacts/Release/*.exe
            build/src/uZXPlayer_artefacts/Release/*.exe
