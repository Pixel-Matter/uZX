name: Test sccache on Windows

on:
  workflow_dispatch:

jobs:
  test-sccache:
    runs-on: windows-2022
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Create test file
        shell: pwsh
        run: |
          @"
          #include <iostream>
          int main() {
              std::cout << "Hello from sccache test" << std::endl;
              return 0;
          }
          "@ | Out-File -Encoding utf8 test.cpp

      - name: Compile (cold cache)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          sccache cl /EHsc /Fe:test.exe test.cpp
          test.exe

      - name: Show sccache stats (after first compile)
        run: sccache --show-stats

      - name: Clean and recompile (should hit cache)
        shell: cmd
        run: |
          del test.exe test.obj
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          sccache cl /EHsc /Fe:test.exe test.cpp
          test.exe

      - name: Show sccache stats (after cached compile)
        run: sccache --show-stats
